<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script>
      window.addEventListener('error', function(e) {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#900;color:#fff;padding:5px;z-index:999999;font-family:monospace;white-space:pre-wrap;font-size:10px;direction:ltr;text-align:left;';
        banner.textContent = 'OVERLAY ERROR:\n' + e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : '');
        document.body.appendChild(banner);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#900;color:#fff;padding:5px;z-index:999999;font-family:monospace;white-space:pre-wrap;font-size:10px;direction:ltr;text-align:left;';
        banner.textContent = 'OVERLAY UNHANDLED REJECTION:\n' + (e.reason?.message || e.reason) + '\n' + (e.reason?.stack || '');
        document.body.appendChild(banner);
      });
    </script>
    <style>
      :root {
        --ov-accent: #7d8bff;
        --ov-accent-2: #b478ff;
        --ov-text: #eef0ff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: transparent;
      }
      body {
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }

      .bar {
        position: relative;
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 5px 6px;
        border-radius: 13px;
        background: linear-gradient(135deg, rgba(30, 32, 48, 0.94), rgba(16, 18, 30, 0.94));
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        box-shadow:
          0 12px 34px rgba(0, 0, 0, 0.5),
          0 2px 8px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }
      /* Gradient ring */
      .bar::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(125, 139, 255, 0.85),
          rgba(180, 120, 255, 0.4) 45%,
          rgba(125, 139, 255, 0.12)
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      @keyframes ov-pop {
        from { opacity: 0; transform: translateY(7px) scale(0.95); }
        to   { opacity: 1; transform: none; }
      }
      .bar.show { animation: ov-pop 0.18s cubic-bezier(0.2, 0.8, 0.2, 1); }

      .act {
        position: relative;
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--ov-text);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: transform 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
      }
      .act:hover {
        background: linear-gradient(135deg, rgba(125, 139, 255, 0.22), rgba(180, 120, 255, 0.16));
        transform: translateY(-2px);
        box-shadow: 0 7px 18px rgba(125, 139, 255, 0.28);
      }
      .act:active { transform: translateY(0) scale(0.93); }
      .act:focus-visible { outline: 2px solid var(--ov-accent); outline-offset: 2px; }

      .sep {
        width: 1px;
        height: 18px;
        margin: 0 2px;
        background: linear-gradient(rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02));
      }

      .notification-pill {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(30, 32, 48, 0.95), rgba(16, 18, 30, 0.95));
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        box-shadow:
          0 12px 34px rgba(0, 0, 0, 0.5),
          0 2px 8px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(125, 139, 255, 0.3);
        color: var(--ov-text);
        font-size: 13.5px;
        animation: ov-pop 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
        pointer-events: none;
        max-width: 95vw;
        white-space: nowrap;
      }
      .notification-icon {
        font-size: 18px;
      }
      .notification-text {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="bar show" id="bar" role="toolbar" aria-label="إجراءات النص السريعة">
      <button class="act" data-action="translate" title="ترجمة فورية" aria-label="ترجمة فورية">🌐</button>
      <button class="act" data-action="speak" title="نطق النص" aria-label="نطق النص">🔊</button>
      <button class="act" data-action="summarize" title="تلخيص النص" aria-label="تلخيص النص">📝</button>
      <span class="sep" aria-hidden="true"></span>
      <button class="act" data-action="grammar" title="تدقيق إملائي ولغوي" aria-label="تدقيق إملائي ولغوي">✍️</button>
      <button class="act" data-action="diacritize" title="تشكيل الحركات العربية" aria-label="تشكيل الحركات العربية">✏️</button>
    </div>

    <div class="notification-pill" id="notification-pill">
      <span class="notification-icon" id="notification-icon">🎙️</span>
      <span class="notification-text" id="notification-text">بدأ تسجيل الصوت في الخلفية...</span>
    </div>

    <script type="module" src="overlay.js"></script>
  </body>
</html>
