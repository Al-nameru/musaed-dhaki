<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css?v=1.0.2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المساعد الذكي للصوت والنصوص</title>
    <script>
      window.addEventListener('error', function(e) {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#900;color:#fff;padding:15px;z-index:999999;font-family:monospace;white-space:pre-wrap;direction:ltr;text-align:left;';
        banner.textContent = 'FRONTEND ERROR:\n' + e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : '');
        document.body.appendChild(banner);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#900;color:#fff;padding:15px;z-index:999999;font-family:monospace;white-space:pre-wrap;direction:ltr;text-align:left;';
        banner.textContent = 'UNHANDLED REJECTION:\n' + (e.reason?.message || e.reason) + '\n' + (e.reason?.stack || '');
        document.body.appendChild(banner);
      });
    </script>
    <script type="module" src="./partialsLoader.js?v=1.0.2" defer></script>
    <script type="module" src="./main.js?v=1.0.2" defer></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon">⚡</span>
          <span class="brand-name">المساعد الذكي</span>
          <div class="brand-actions">
            <button id="btn-activate-sidebar-picker" class="sidebar-toggle-btn picker-btn" type="button" title="بدء تشغيل مفتش العناصر بصرية" aria-label="مفتش العناصر"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            <button id="btn-open-error-inspector" class="sidebar-toggle-btn error-inspector-btn" type="button" title="عرض سجل الأخطاء والكونسول" aria-label="مفتش الأخطاء"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
            <button id="btn-refresh-app" class="sidebar-toggle-btn" type="button" title="تحديث التبويب النشط وإخفاء أي أشرطة سريعة عالقة" aria-label="تحديث التبويب النشط">🔄</button>
            <button id="btn-toggle-sidebar" class="sidebar-toggle-btn" type="button" title="طي/فتح القائمة الجانبية" aria-label="طي أو فتح القائمة الجانبية">☰</button>
          </div>
        </div>
        <nav class="nav-menu">
          <button class="nav-item active" data-tab="tab-home">
            <span class="drag-handle" title="اسحب لإعادة الترتيب">⠿</span>
            <span class="nav-icon">🎙️</span> الصوت والنص
          </button>
          <button class="nav-item" data-tab="tab-keys">
            <span class="drag-handle" title="اسحب لإعادة الترتيب">⠿</span>
            <span class="nav-icon nav-icon-keys"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg></span> مفاتيح الذكاء الاصطناعي
          </button>
          <button class="nav-item" data-tab="tab-compare">
            <span class="drag-handle" title="اسحب لإعادة الترتيب">⠿</span>
            <span class="nav-icon">⚖️</span> مقارنة النماذج
          </button>
          <button class="nav-item" data-tab="tab-settings">
            <span class="drag-handle" title="اسحب لإعادة الترتيب">⠿</span>
            <span class="nav-icon">⚙️</span> الإعدادات والخيارات
          </button>
          <button class="nav-item" data-tab="tab-alerts">
            <span class="drag-handle" title="اسحب لإعادة الترتيب">⠿</span>
            <span class="nav-icon">🔔</span> التنبيهات والملاحظات
          </button>
          <button class="nav-item" data-tab="tab-stats">
            <span class="drag-handle" title="اسحب لإعادة الترتيب">⠿</span>
            <span class="nav-icon">📊</span> إحصائيات الاستهلاك
          </button>
        </nav>
      </aside>

      <!-- محتوى التبويبات الرئيسي -->
      <main class="main-content">
        <div data-partial="partials/tab-home.html"></div>
        <div data-partial="partials/tab-keys.html"></div>
        <div data-partial="partials/tab-compare.html"></div>
        <div data-partial="partials/tab-settings.html"></div>
        <div data-partial="partials/tab-alerts.html"></div>
        <div data-partial="partials/tab-stats.html"></div>
      </main>
    </div>

    <div data-partial="partials/quick-tools.html"></div>
    <div class="dynamic-island" id="dynamic-island">
      <div class="island-pulse" id="island-pulse"></div>
      <span class="island-icon" id="island-icon">🎙️</span>
      <span class="island-status" id="island-status">جاهز</span>
    </div>
    <button id="fab-activate-picker" class="fab-picker-btn" type="button" title="بدء تشغيل مفتش العناصر بصرية" aria-label="مفتش العناصر"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>

    <!-- نافذة مفتش الأخطاء والكونسول -->
    <div id="error-inspector-modal" class="error-inspector-modal">
      <div class="error-inspector-backdrop"></div>
      <div class="error-inspector-content">
        <div class="error-inspector-header">
          <h3>🐞 مفتش الأخطاء والكونسول</h3>
          <button id="btn-close-error-inspector" class="btn-close-modal" type="button">&times;</button>
        </div>
        <div class="error-inspector-tabs">
          <button class="inspector-tab active" data-tab="app-errors">أخطاء التطبيق (<span id="app-errors-count">0</span>)</button>
          <button class="inspector-tab" data-tab="console-errors">سجلات الكونسول (<span id="console-errors-count">0</span>)</button>
        </div>
        <div class="error-inspector-body">
          <div id="tab-content-app-errors" class="tab-content active">
            <div class="toolbar">
              <button id="btn-copy-app-errors" class="btn-action">📋 نسخ كافة الأخطاء</button>
              <button id="btn-clear-app-errors" class="btn-action btn-danger-action">🧹 مسح السجل</button>
            </div>
            <div id="app-errors-list" class="errors-list-container">
              <div class="empty-state">لا توجد أخطاء مسجلة للتطبيق حالياً.</div>
            </div>
          </div>
          <div id="tab-content-console-errors" class="tab-content">
            <div class="toolbar">
              <button id="btn-copy-console-errors" class="btn-action">📋 نسخ كافة السجلات</button>
              <button id="btn-clear-console-errors" class="btn-action btn-danger-action">🧹 مسح السجل</button>
            </div>
            <div id="console-errors-list" class="errors-list-container">
              <div class="empty-state">لا توجد سجلات أخطاء كونسول حالياً.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
